<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';" />
  <title>Tasks</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root { --pr: 6; --pg: 6; --pb: 18; --fg: 255; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      color: rgba(var(--fg), var(--fg), var(--fg), 1);
      -webkit-font-smoothing: antialiased;
      user-select: none;
      overflow: hidden;
      height: 100vh;
    }

    .shell {
      display: flex;
      flex-direction: column;
      /* height set by JS so CSS transition can animate it */
      padding: 18px 16px 20px 18px;
      gap: 12px;
      overflow: hidden;
      /* Right-docked default: dark on right, fades left toward screen center */
      background: linear-gradient(to left,
        rgba(var(--pr), var(--pg), var(--pb), 0.6)  0%,
        rgba(var(--pr), var(--pg), var(--pb), 0.28) 55%,
        transparent                                  100%
      );
      transition: height 0.28s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ── Title bar ───────────────────────────────────────────────────────────── */

    .titlebar {
      -webkit-app-region: drag;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      padding-bottom: 4px;
    }

    .header-title {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.4px;
      color: rgba(var(--fg), var(--fg), var(--fg), 0.95);
    }

    .collapse-btn {
      -webkit-app-region: no-drag;
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(var(--fg), var(--fg), var(--fg), 0.75);
      font-size: 12px;
      padding: 0 2px;
      line-height: 1;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: color 0.15s;
    }
    .collapse-btn:hover { color: rgba(var(--fg), var(--fg), var(--fg), 1); }

    /* ── Task list ───────────────────────────────────────────────────────────── */

    .task-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow-y: auto;
      flex: 1;
      transition: opacity 0.22s ease, transform 0.22s ease;
    }
    .task-list::-webkit-scrollbar { display: none; }
    .task-list.collapsing {
      opacity: 0;
      transform: translateY(-6px);
      pointer-events: none;
    }

    /* ── Task card ───────────────────────────────────────────────────────────── */

    .task-card {
      display: flex;
      align-items: flex-start;
      gap: 9px;
      padding: 10px 11px;
      background: rgba(var(--pr), var(--pg), var(--pb), 0.55);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 15px;
      border: 1px solid rgba(var(--fg), var(--fg), var(--fg), 0.08);
      box-shadow: inset 0 1px 0 rgba(var(--fg), var(--fg), var(--fg), 0.06);
      transition: opacity 0.45s ease, transform 0.45s ease;
      overflow: hidden;
    }

    .task-card.completing {
      opacity: 0;
      transform: scale(0.97) translateX(10px);
    }

    /* ── Circular tick ───────────────────────────────────────────────────────── */

    .tick {
      flex-shrink: 0;
      width: 18px;
      height: 18px;
      margin-top: 1px;
      border-radius: 50%;
      border: 1.5px solid rgba(var(--fg), var(--fg), var(--fg), 0.28);
      background: transparent;
      cursor: pointer;
      -webkit-app-region: no-drag;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.18s, background 0.18s;
    }
    .tick:hover { border-color: rgba(var(--fg), var(--fg), var(--fg), 0.6); }
    .tick svg { display: none; }
    .tick.checked { border-color: #4ade80; background: #4ade80; }
    .tick.checked svg { display: block; }

    /* ── Card body ───────────────────────────────────────────────────────────── */

    .task-body { flex: 1; min-width: 0; }

    .task-title {
      font-size: 12.5px;
      font-weight: 500;
      color: rgba(var(--fg), var(--fg), var(--fg), 0.9);
      line-height: 1.35;
      word-break: break-word;
    }

    .task-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 5px;
    }

    .type-badge {
      display: inline-flex;
      align-items: center;
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 99px;
    }

    .due-label {
      font-size: 11px;
      color: rgba(var(--fg), var(--fg), var(--fg), 0.35);
    }
    .due-label.soon  { color: #fbbf24; }
    .due-label.today { color: #fb923c; }
    .due-label.over  { color: #f87171; }

    /* ── Right-docked overrides ──────────────────────────────────────────────── */

    /* Right side: chevron left of "Tasks" → row-reverse so button renders first */
    body[data-side="right"] .titlebar {
      flex-direction: row-reverse;
    }

    /* ── Left-docked overrides ───────────────────────────────────────────────── */

    body[data-side="left"] .shell {
      padding: 18px 18px 20px 16px;
      /* Left-docked: dark on left, fades right toward screen center */
      background: linear-gradient(to right,
        rgba(var(--pr), var(--pg), var(--pb), 0.6)  0%,
        rgba(var(--pr), var(--pg), var(--pb), 0.28) 55%,
        transparent                                  100%
      );
    }

    /* Tick moves to right, body text stays left-aligned */
    body[data-side="left"] .task-card {
      flex-direction: row-reverse;
    }

    /* Slide toward left edge on completion */
    body[data-side="left"] .task-card.completing {
      transform: scale(0.97) translateX(-10px);
    }

    /* ── Empty state ─────────────────────────────────────────────────────────── */

    .empty {
      text-align: center;
      color: rgba(var(--fg), var(--fg), var(--fg), 0.25);
      font-size: 13px;
      padding: 48px 0;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="titlebar">
      <span class="header-title">Tasks</span>
      <button class="collapse-btn" id="collapse">▼</button>
    </header>
    <div class="task-list" id="task-list"></div>
  </div>
  <script type="module" src="tasks.js"></script>
</body>
</html>
