<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';" />
  <title>Settings</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      background: #1e1e2e;
      color: #cdd6f4;
      padding: 20px;
      user-select: none;
    }

    h2 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #cba6f7;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-bottom: 14px;
    }

    label {
      color: #a6adc8;
      font-size: 12px;
    }

    input[type="text"],
    input[type="number"] {
      width: 100%;
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid #45475a;
      background: #313244;
      color: #cdd6f4;
      font-size: 13px;
      outline: none;
    }

    input[type="text"]:focus,
    input[type="number"]:focus {
      border-color: #89b4fa;
    }

    input[type="color"] {
      width: 100%;
      height: 34px;
      padding: 2px 4px;
      border-radius: 6px;
      border: 1px solid #45475a;
      background: #313244;
      cursor: pointer;
    }

    button {
      margin-top: 6px;
      width: 100%;
      padding: 8px;
      border-radius: 6px;
      border: none;
      background: #89b4fa;
      color: #1e1e2e;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: #b4befe; }
  </style>
</head>
<body>
  <h2>Settings</h2>

  <div class="field">
    <label for="dex">Pokémon DEX number</label>
    <input id="dex" type="text" placeholder="e.g. 0025" />
  </div>

  <div class="field">
    <label for="scale">Sprite scale</label>
    <input id="scale" type="number" min="1" max="6" step="0.5" />
  </div>

  <div class="field">
    <label for="portraitScale">Portrait scale</label>
    <input id="portraitScale" type="number" min="0.5" max="4" step="0.5" />
  </div>

  <div class="field">
    <label for="borderColor">Portrait border color</label>
    <input id="borderColor" type="color" />
  </div>

  <button id="save">Save &amp; Restart</button>

  <script type="module" src="settings.js"></script>
</body>
</html>
